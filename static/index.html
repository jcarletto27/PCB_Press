<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCB Press - 3D Prototyping</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        #viewer-container { cursor: grab; }
        #viewer-container:active { cursor: grabbing; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body class="flex h-screen bg-slate-50 text-slate-800 font-sans overflow-hidden">

    <aside class="w-1/3 min-w-[350px] max-w-[450px] bg-white border-r border-slate-200 p-6 overflow-y-auto flex flex-col gap-6 shadow-lg z-10">
        <div>
            <h1 class="text-2xl font-bold text-indigo-600 flex items-center gap-2">
                PCB Press
            </h1>
        </div>

        <div class="bg-slate-50 p-4 rounded-lg border border-slate-200">
            <h2 class="font-semibold mb-3">1. Upload Project (.zip)</h2>
            <input type="file" id="zipFile" accept=".zip" class="block w-full text-sm">
            <button id="uploadBtn" class="mt-3 w-full bg-indigo-600 text-white py-2 rounded-md">Upload & Parse</button>
        </div>

        <div id="mappingSection" class="bg-slate-50 p-4 rounded-lg border border-slate-200 opacity-50 pointer-events-none">
            <h2 class="font-semibold mb-3">2. Map Layers</h2>
            <div class="space-y-3">
                <div><label class="text-xs font-semibold">Board Outline</label><select id="outlineLayer" class="w-full mt-1 p-2 border rounded-md text-sm"></select></div>
                <div><label class="text-xs font-semibold">Traces</label><select id="traceLayer" class="w-full mt-1 p-2 border rounded-md text-sm"></select></div>
                <div><label class="text-xs font-semibold">Drills / Vias</label><select id="viaLayer" class="w-full mt-1 p-2 border rounded-md text-sm"></select></div>
            </div>
        </div>

        <div id="settingsSection" class="bg-slate-50 p-4 rounded-lg border border-slate-200 opacity-50 pointer-events-none">
            <h2 class="font-semibold mb-3">3. Board Settings</h2>
            <input type="color" id="traceColorPicker" value="#ff0000" class="w-full h-10 rounded">
            <button id="generateBtn" class="mt-5 w-full bg-emerald-600 text-white py-2 rounded-md">Generate 3D Models</button>
        </div>
    </aside>

    <main class="flex-1 relative bg-slate-900 flex flex-col">
        <div id="viewer-container" class="flex-1 w-full h-full"></div>
    </main>

    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        let currentFolderId = null, currentMesh = null;
        
        // API Handling
        document.getElementById('uploadBtn').onclick = async () => {
            const file = document.getElementById('zipFile').files[0];
            const formData = new FormData();
            formData.append('file', file);
            
            const res = await fetch('/api/upload', { method: 'POST', body: formData });
            const data = await res.json();
            
            currentFolderId = data.upload_folder_id;
            const selects = ['outlineLayer', 'traceLayer', 'viaLayer'];
            selects.forEach(id => {
                const el = document.getElementById(id);
                el.innerHTML = data.layers.map(l => `<option value="${l}">${l}</option>`).join('');
            });
            
            document.getElementById('mappingSection').style.opacity = 1;
            document.getElementById('mappingSection').style.pointerEvents = 'auto';
            document.getElementById('settingsSection').style.opacity = 1;
            document.getElementById('settingsSection').style.pointerEvents = 'auto';
        };

        document.getElementById('generateBtn').onclick = async () => {
            const payload = {
                upload_folder_id: currentFolderId,
                outline_layer: document.getElementById('outlineLayer').value,
                trace_layer: document.getElementById('traceLayer').value,
                via_layer: document.getElementById('viaLayer').value
            };
            
            const res = await fetch('/api/generate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            if (data.main_model_url) loadSTL(data.main_model_url);
        };

        // Three.js setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth * 0.66, window.innerHeight);
        document.getElementById('viewer-container').appendChild(renderer.domElement);
        
        function loadSTL(url) {
            const loader = new STLLoader();
            loader.load(url, (geo) => {
                if (currentMesh) scene.remove(currentMesh);
                currentMesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: document.getElementById('traceColorPicker').value }));
                scene.add(currentMesh);
            });
        }
        
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        camera.position.z = 50;
        animate();
    </script>
</body>
</html>
